version: "3.8"

volumes:
  HNG-nginx-logs:
    driver: local

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    restart: unless-stopped

  detector:
    build: ./detector
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
